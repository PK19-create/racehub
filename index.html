<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Race Hub</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#0e1319; --panel:#161d27; --panel2:#1e2732; --line:#2a3646;
  --text:#e8edf2; --muted:#8a99ab; --accent:#ff6b1a; --accent2:#ffa25c;
  --green:#2ecc71; --red:#e74c3c; --blue:#3ba3ff; --yellow:#f1c40f;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:15px;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;background:var(--panel2);color:var(--text);padding:8px 14px;font-size:14px}
button:hover{filter:brightness(1.15)}
button.primary{background:var(--accent);color:#fff;font-weight:600}
button.small{padding:4px 10px;font-size:12px}
button.ghost{background:transparent;border:1px solid var(--line)}
button.danger{background:transparent;color:var(--red);border:1px solid var(--red)}
button.active-mode{background:var(--accent);color:#fff}
input,select,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;width:100%}
input:focus,select:focus{outline:1px solid var(--accent)}
h1{font-size:20px}h2{font-size:17px}h3{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.hidden{display:none!important}

/* ===== Header ===== */
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);height:56px}
header .logo{font-weight:800;font-size:18px;letter-spacing:.02em;white-space:nowrap}
header .logo span{color:var(--accent)}
header .crumb{color:var(--muted);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
header .crumb b{color:var(--text)}
header .crumb a{color:var(--accent2);cursor:pointer;text-decoration:none}

/* ===== Hub view ===== */
#hubView{height:calc(100% - 56px);overflow-y:auto;padding:20px;max-width:1100px;margin:0 auto}
.hub-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.hub-actions{display:flex;gap:8px;flex-wrap:wrap}
.race-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
.race-head{display:flex;align-items:center;gap:12px;padding:14px 16px;flex-wrap:wrap}
.race-head .rname{font-weight:700;font-size:16px;flex:1;min-width:140px}
.race-head .rmeta{color:var(--muted);font-size:13px}
.race-head .cat{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--accent2)}
.stage-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--line);cursor:pointer;flex-wrap:wrap}
.stage-row:hover{background:var(--panel2)}
.stage-row .sname{flex:1;min-width:120px}
.stage-row .smeta{color:var(--muted);font-size:13px;display:flex;gap:14px;flex-wrap:wrap}
.stage-row .wmcount{color:var(--accent2)}
.empty-note{color:var(--muted);padding:30px;text-align:center}
.race-foot{padding:8px 16px;border-top:1px solid var(--line);display:flex;gap:8px}

/* ===== Stage view ===== */
#stageView{height:calc(100% - 56px);display:flex}
#mapCol{flex:1;display:flex;flex-direction:column;min-width:0}
#map{flex:1;min-height:200px;background:#0a0e13}
#profileWrap{height:170px;background:var(--panel);border-top:1px solid var(--line);position:relative;flex-shrink:0}
#profile{width:100%;height:100%;display:block;cursor:crosshair}
#profTip{position:absolute;pointer-events:none;background:#000c;border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px;display:none;z-index:10;white-space:nowrap}
#sidePanel{width:340px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
.sp-section{padding:12px 14px;border-bottom:1px solid var(--line)}
.sp-section .row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
#wmList{flex:1;overflow-y:auto}
.wm-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.wm-item:hover{background:var(--panel2)}
.wm-item .ic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.wm-item .nm{flex:1;min-width:0}
.wm-item .nm .t{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wm-item .nm .s{font-size:12px;color:var(--muted)}
.wm-item .km{font-weight:700;font-size:14px;color:var(--accent2);white-space:nowrap}
.wm-item .del{color:var(--muted);background:none;padding:2px 6px}
.wm-item .del:hover{color:var(--red)}
.stats{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.stats b{color:var(--text);font-size:15px}
.mode-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--accent);color:#fff;padding:8px 16px;border-radius:20px;font-weight:600;font-size:13px;box-shadow:0 2px 12px #0008;display:none}
#panelToggle{display:none}

/* ===== Live view ===== */
#liveView{position:fixed;inset:0;background:var(--bg);z-index:1500;display:flex;flex-direction:column}
.lv-top{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--line)}
.lv-top .lv-name{flex:1;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lv-top .lv-status{font-size:12px;color:var(--muted);white-space:nowrap}
.lv-main{flex:1;display:flex;flex-direction:column;min-height:0}
.lv-nums{display:flex;justify-content:space-around;align-items:baseline;padding:12px 8px;flex-wrap:wrap;gap:6px}
.lv-num{text-align:center;min-width:110px}
.lv-num .v{font-size:54px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.lv-num .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.lv-num.orange .v{color:var(--accent2)}
.lv-next{flex:1;overflow-y:auto;padding:0 10px 8px}
.lv-wm{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.lv-wm .ic{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lv-wm .inf{flex:1;min-width:0}
.lv-wm .inf .t{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lv-wm .inf .s{font-size:13px;color:var(--muted)}
.lv-wm .d{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.lv-wm .d small{font-size:14px;color:var(--muted);font-weight:600}
.lv-wm.first{border-color:var(--accent);background:#241b14}
.lv-wm.first .d{color:var(--accent2)}
#lvMapWrap{height:40%;min-height:180px;border-bottom:1px solid var(--line);flex-shrink:0;position:relative}
#lvMap{width:100%;height:100%;background:#0a0e13}
#lvZooms{position:absolute;left:8px;top:8px;z-index:800;display:flex;flex-direction:column;gap:4px}
#lvZooms button{padding:5px 9px;font-size:12px;background:#000c;border:1px solid var(--line);border-radius:8px;color:var(--text)}
#lvZooms button.active-mode{background:var(--accent);border-color:var(--accent)}
#lvAlert{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:1600;display:none;align-items:center;gap:14px;background:var(--red);border:2px solid #ffffff66;border-radius:16px;padding:10px 22px;box-shadow:0 4px 24px #000c;white-space:nowrap;color:#fff}
#lvAlert .ic{font-size:38px;display:flex;align-items:center}
#lvAlert .d{font-size:42px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;color:#fff}
#lvAlert .n{font-size:15px;color:#ffe0d6;margin-top:2px}
.wm-nr{position:absolute;top:-7px;right:-7px;background:#0c1117;border:1px solid #ffffff66;border-radius:50%;min-width:16px;height:16px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}
.nr-chip{background:var(--panel2);border:1px solid var(--line);border-radius:6px;min-width:22px;height:22px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.lv-profwrap{height:150px;background:var(--panel);border-top:1px solid var(--line);flex-shrink:0}
#liveProfile{width:100%;height:100%;display:block}
.lv-offroute{background:var(--red);color:#fff;text-align:center;font-weight:700;padding:6px;display:none}
@media (max-width:600px){ .lv-num .v{font-size:36px} .lv-num{min-width:80px} .lv-wm .d{font-size:26px} .lv-profwrap{height:110px} }

/* ===== Modal ===== */
.modal-bg{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h2{margin-bottom:14px}
.modal label{display:block;font-size:13px;color:var(--muted);margin:12px 0 4px}
.modal .btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.type-btn{padding:8px 4px;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:3px;border:1px solid var(--line)}
.type-btn .em{font-size:18px}
.type-btn.sel{border-color:var(--accent);background:var(--panel2)}
.tg-head{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 4px}
.lv-wm.passed{opacity:.45}

/* leaflet dark tweak */
.leaflet-container{font:inherit}
.leaflet-control-attribution{background:#0009!important;color:var(--muted)!important;font-size:10px!important}
.leaflet-control-attribution a{color:var(--muted)!important}
.wm-divicon{display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;box-shadow:0 1px 4px #000a;border:2px solid #fff3}
.kmlabel{background:none;border:none;box-shadow:none;color:#fff;font-size:10px;font-weight:700;text-shadow:0 1px 3px #000}

/* ===== Responsive ===== */
@media (max-width:820px){
  #stageView{flex-direction:column}
  #sidePanel{width:100%;height:45%;border-left:none;border-top:1px solid var(--line);order:3}
  #sidePanel.collapsed{height:auto}
  #sidePanel.collapsed .sp-hide{display:none}
  #profileWrap{height:120px}
  #panelToggle{display:block;width:100%;border-radius:0;background:var(--panel2);padding:8px;font-size:13px}
  header{padding:8px 10px}
  header .logo{font-size:15px}
}
</style>
</head>
<body>

<header>
  <div class="logo">RACE<span>HUB</span> <small style="font-size:9px;color:var(--muted);font-weight:400">v8</small></div>
  <div class="crumb" id="crumb"></div>
  <button class="small ghost" id="btnExportAll" title="Backup van alle data">⬇ Backup</button>
  <button class="small ghost" id="btnImportAll" title="Backup terugzetten">⬆ Herstel</button>
</header>

<!-- ============ HUB (seizoensoverzicht) ============ -->
<div id="hubView">
  <div class="hub-top">
    <div>
      <h1>Seizoensoverzicht</h1>
      <div style="color:var(--muted);font-size:13px;margin-top:2px" id="seasonStats"></div>
    </div>
    <div class="hub-actions">
      <button class="primary" id="btnAddRace">+ Nieuwe koers</button>
    </div>
  </div>
  <div id="raceList"></div>
</div>

<!-- ============ STAGE (kaart + profiel + waymarkers) ============ -->
<div id="stageView" class="hidden">
  <div id="mapCol">
    <div style="position:relative;flex:1;display:flex;flex-direction:column;min-height:0">
      <div id="map" style="flex:1"></div>
      <div class="mode-banner" id="modeBanner"></div>
    </div>
    <div id="profileWrap">
      <canvas id="profile"></canvas>
      <div id="profTip"></div>
    </div>
  </div>
  <button id="panelToggle">☰ Waymarkers &amp; route</button>
  <div id="sidePanel">
    <div class="sp-section sp-hide">
      <div class="stats" id="stageStats"></div>
      <div class="row">
        <button class="small" id="btnGpx">📂 GPX laden</button>
        <button class="small" id="btnNeutral" title="Neutralisatie-GPX vooraan plakken; km 0 schuift naar de officiële start">🏳 Neutralisatie</button>
        <button class="small" id="btnAnalyze" title="Automatisch klimmen, afdalingen, bochten, spoorwegovergangen, rotondes en tunnels detecteren">🪄 Analyseer</button>
        <button class="small" id="btnDraw">✏️ Tekenen</button>
        <button class="small" id="btnUndoPt">↩ Punt terug</button>
        <button class="small danger" id="btnClearRoute">✕ Route wissen</button>
      </div>
      <input type="file" id="gpxFile" accept=".gpx" class="hidden">
      <input type="file" id="neutralFile" accept=".gpx" class="hidden">
    </div>
    <div class="sp-section sp-hide">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3>Waymarkers</h3>
        <div style="display:flex;gap:6px">
          <button class="small" id="btnAddWmMap">+ op kaart</button>
          <button class="small" id="btnAddWmKm">+ op km</button>
          <button class="small ghost" id="btnWmImport" title="Waymarkers kopiëren uit een andere etappe of koers">⧉</button>
        </div>
      </div>
      <div class="row" style="align-items:center;font-size:12px;color:var(--muted)">
        km 0 om <input id="stT0" type="time" style="width:100px">
        aan <input id="stSpeed" type="number" min="20" max="60" step="1" style="width:64px" placeholder="40"> km/u → passagetijden
      </div>
    </div>
    <div id="wmList" class="sp-hide"></div>
    <div class="sp-section" style="border-top:1px solid var(--line);border-bottom:none">
      <div class="row" style="margin-top:0">
        <button class="primary" id="btnLive" style="flex:1;font-size:16px">▶ LIVE</button>
        <button class="small ghost" id="btnExportGpx">⬇ GPX head-unit</button>
        <button class="small ghost" id="btnStagePrint">🖨 Roadbook</button>
      </div>
    </div>
  </div>
</div>

<!-- ============ LIVE (in de auto) ============ -->
<div id="liveView" class="hidden">
  <div class="lv-top">
    <div class="lv-name" id="lvName"></div>
    <div class="lv-status" id="lvStatus">–</div>
    <button class="small" id="lvClock" title="Tijd, gemiddelde, tijdslimiet en km 0">⏱</button>
    <button class="small" id="lvMapBtn" title="Kaart tonen/verbergen">🗺 Kaart</button>
    <button class="small" id="lvSim" title="Simulatie: rijd virtueel over het parcours">SIM</button>
    <button class="small danger" id="lvExit">✕ Stop</button>
  </div>
  <div class="lv-offroute" id="lvOff">NAAST PARCOURS</div>
  <div id="lvAlert"><div class="ic"></div><div><div class="d"></div><div class="n"></div></div></div>
  <div class="lv-main">
    <div id="lvMapWrap" class="hidden"><div id="lvMap"></div><div id="lvZooms"></div></div>
    <div class="lv-nums">
      <div class="lv-num"><div class="v" id="lvKm">–</div><div class="l">km parcours</div></div>
      <div class="lv-num orange"><div class="v" id="lvToGo">–</div><div class="l">km te gaan</div></div>
      <div class="lv-num"><div class="v" id="lvSpeed">–</div><div class="l">km/u</div></div>
      <div class="lv-num"><div class="v" id="lvHm">–</div><div class="l">hm te gaan</div></div>
      <div class="lv-num"><div class="v" id="lvElapsed" style="font-size:34px">–</div><div class="l">sinds km 0 · <span id="lvAvg">–</span> gem</div></div>
    </div>
    <div class="lv-next" id="lvNext"></div>
    <div class="lv-profwrap"><canvas id="liveProfile"></canvas></div>
  </div>
</div>

<div id="modalHost"></div>

<script>
'use strict';
/* ================= Waymarker types ================= */
const WM_TYPES = {
  klim:     {label:'Klim',        em:'⛰',  color:'#e74c3c'},
  afdaling: {label:'Afdaling',    em:'↘️', color:'#3b82c4'},
  sprint:   {label:'Sprint',      em:'⚡',  color:'#2ecc71'},
  bonus:    {label:'Bonificatie', em:'⏱️', color:'#2ecc71'},
  feed:     {label:'Bevoorrading',em:'🍶', color:'#3ba3ff'},
  gevaar:   {label:'Gevaar',      em:'⚠️', color:'#f1c40f'},
  bocht:    {label:'Bocht',       em:'↪️', color:'#3b82c4'},
  rotonde:  {label:'Rotonde',     em:'🔄', color:'#f1c40f'},
  smal:     {label:'Versmalling', em:'🚧', color:'#ff8c42'},
  spoor:    {label:'Spoorweg',    em:'🚂', color:'#c9d4e0'},
  tunnel:   {label:'Tunnel',      em:'🚇', color:'#9b59b6'},
  brug:     {label:'Brug',        em:'🌉', color:'#3ba3ff'},
  kassei:   {label:'Kasseien',    em:'🧱', color:'#b06a3b'},
  gravel:   {label:'Gravel',      em:'🪨', color:'#8f7a4f'},
  kom:      {label:'Dorpskern',   em:'🏘️', color:'#8a99ab'},
  mat:      {label:'Materiaal',   em:'🔧', color:'#9b59b6'},
  start:    {label:'Start',       em:'🟢', color:'#2ecc71'},
  finish:   {label:'Finish',      em:'🏁', color:'#ffffff'},
  info:     {label:'Info',        em:'ℹ️', color:'#8a99ab'},
};

/* ================= State & storage ================= */
const LS_KEY = 'racehub-v1';
let state = load();
function load(){
  try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s && s.races) return s; }catch(e){}
  return {races:[]};
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ alert('Opslaan mislukt (opslag vol?). Maak een backup en verwijder oude koersen.'); }
}
const uid = () => Math.random().toString(36).slice(2,10);
const fmtKm = m => (m/1000).toFixed(1).replace('.',',');

let cur = {race:null, stage:null}; // current selection
let mode = 'view'; // view | draw | wm-map
let map=null, routeLine=null, wmLayer=null, drawLayer=null, posDot=null, kmLayer=null;

/* ================= Geo helpers ================= */
function hav(a,b){
  const R=6371000, toR=Math.PI/180;
  const dLat=(b[0]-a[0])*toR, dLng=(b[1]-a[1])*toR;
  const s=Math.sin(dLat/2)**2 + Math.cos(a[0]*toR)*Math.cos(b[0]*toR)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
/* track = array of [lat,lng,ele]; returns cumulative dist array (m) */
function cumDist(track){
  const d=[0];
  for(let i=1;i<track.length;i++) d.push(d[i-1]+hav(track[i-1],track[i]));
  return d;
}
function totalAscent(track){
  let up=0, last=null;
  for(const p of track){
    if(p[2]==null) continue;
    if(last!=null && p[2]>last) up += p[2]-last;
    last=p[2];
  }
  return Math.round(up);
}
/* groepen voor de waymarker-kiezer */
const WM_GROUPS=[
  ['Gevaar',     ['gevaar','bocht','rotonde','smal','spoor','tunnel','brug','kom','afdaling']],
  ['Essentieel', ['klim','sprint','bonus','kassei','gravel','start','finish']],
  ['Logistiek',  ['feed','mat','info']],
];
function recentTypes(){ try{ return JSON.parse(localStorage.getItem('rh-recent-types'))||[]; }catch(e){ return []; } }
function pushRecentType(t){
  const r=[t, ...recentTypes().filter(x=>x!==t)].slice(0,6);
  try{ localStorage.setItem('rh-recent-types', JSON.stringify(r)); }catch(e){}
}
/* sector: lengte + gemiddeld % als endKm gezet is */
function sectorText(st, w, dists, kz){
  if(w.endKm==null || isNaN(w.endKm)) return '';
  const len=w.endKm-w.km;
  if(len<=0) return '';
  let txt=len.toFixed(1).replace('.',',')+' km';
  const p1=pointAtDist(st.track,dists,kz+w.km*1000), p2=pointAtDist(st.track,dists,kz+w.endKm*1000);
  if(p1&&p2&&p1[2]!=null&&p2[2]!=null){
    const g=(p2[2]-p1[2])/(len*1000)*100;
    if(g>0.5) txt+=' @ '+g.toFixed(1).replace('.',',')+'%';
  }
  return txt;
}
/* verwachte passagetijd o.b.v. 0km-tijd + gem. snelheid */
function etaText(st, kmRel){
  if(!st.t0time) return '';
  const parts=st.t0time.split(':'); if(parts.length<2) return '';
  const sp=+st.avgSpeed||40;
  let total=Math.round((+parts[0])*60+(+parts[1]) + (kmRel/sp)*60);
  total=((total%1440)+1440)%1440;
  return String(Math.floor(total/60)).padStart(2,'0')+':'+String(total%60).padStart(2,'0');
}
/* routepunten van een sector (voor gekleurde overlay op kaart) */
function sectorLatLngs(st, dists, kz, w){
  const a=kz+w.km*1000, b=kz+w.endKm*1000, out=[];
  const pA=pointAtDist(st.track,dists,a); if(pA) out.push([pA[0],pA[1]]);
  for(let i=0;i<st.track.length;i++){ if(dists[i]>a && dists[i]<b) out.push([st.track[i][0],st.track[i][1]]); }
  const pB=pointAtDist(st.track,dists,b); if(pB) out.push([pB[0],pB[1]]);
  return out;
}
/* ===== Route-analyse: automatische waymarker-suggesties ===== */
/* klimmen (dir=+1) / afdalingen (dir=-1) uit geresampled hoogteprofiel (stap = 100 m) */
function findRuns(ele, step, dir){
  const out=[], n=ele.length;
  const grad=i=>{ if(ele[i]==null||ele[i-1]==null) return 0; return dir*(ele[i]-ele[i-1])/step; };
  let i=1;
  while(i<n){
    if(grad(i)>=0.03){
      const start=i-1;
      let j=i+1, gap=0, lastGood=i;
      while(j<n){
        if(grad(j)>=0.01){ gap=0; lastGood=j; }
        else { gap+=step; if(gap>400) break; }
        j++;
      }
      const end=lastGood, len=(end-start)*step;
      if(ele[start]!=null && ele[end]!=null && len>0){
        const gain=dir*(ele[end]-ele[start]);
        const avg=gain/len*100;
        if(dir>0 ? (len>=500&&gain>=30&&avg>=2.5) : (len>=1500&&gain>=60&&avg>=4)){
          out.push(dir>0
            ? {type:'klim', name:'', km:start*step, endKm:end*step, note:'auto: '+Math.round(gain)+' hm · '+avg.toFixed(1)+'%'}
            : {type:'afdaling', name:'', km:start*step, endKm:end*step, note:'auto: '+avg.toFixed(1)+'% gem.'});
        }
      }
      i=end+1;
    } else i++;
  }
  return out;
}
/* scherpe bochten uit koersverandering (±35 m venster, ≥75°) */
function detectBends(track, dists){
  const brg=(a,b)=>{
    const toR=Math.PI/180, dl=(b[1]-a[1])*toR;
    return Math.atan2(Math.sin(dl)*Math.cos(b[0]*toR),
      Math.cos(a[0]*toR)*Math.sin(b[0]*toR)-Math.sin(a[0]*toR)*Math.cos(b[0]*toR)*Math.cos(dl))*180/Math.PI;
  };
  const cands=[];
  for(let i=1;i<track.length-1;i++){
    let a=i-1; while(a>0 && dists[i]-dists[a]<35) a--;
    let b=i+1; while(b<track.length-1 && dists[b]-dists[i]<35) b++;
    if(dists[i]-dists[a]<15 || dists[b]-dists[i]<15) continue;
    let d=brg(track[i],track[b])-brg(track[a],track[i]);
    while(d>180)d-=360; while(d<-180)d+=360;
    if(Math.abs(d)>=75) cands.push({m:dists[i], ang:d});
  }
  const merged=[];
  cands.sort((x,y)=>x.m-y.m);
  for(const c of cands){
    const last=merged[merged.length-1];
    if(last && c.m-last.m<120){ if(Math.abs(c.ang)>Math.abs(last.ang)){ last.m=c.m; last.ang=c.ang; } }
    else merged.push({...c});
  }
  let res=merged.map(c=>({type:'bocht', name:'Scherpe bocht '+(c.ang>0?'rechts':'links'), km:c.m, endKm:null, dir:c.ang>0?'R':'L', deg:Math.round(Math.abs(c.ang)), note:'auto'}));
  if(res.length>25){
    res.sort((a,b)=>b.deg-a.deg);
    res=res.slice(0,25).sort((a,b)=>a.km-b.km);
  }
  return res;
}
/* spoorwegovergangen, rotondes en tunnels via OpenStreetMap (Overpass) */
async function osmSuggest(st, dists){
  const pts=thin(st.track,300).map(p=>p[0].toFixed(4)+','+p[1].toFixed(4)).join(',');
  const q='[out:json][timeout:25];(node(around:25,'+pts+')["railway"="level_crossing"];way(around:25,'+pts+')["junction"="roundabout"];way(around:25,'+pts+')["tunnel"]["highway"];);out center;';
  const r=await fetch('https://overpass-api.de/api/interpreter',{
    method:'POST', body:'data='+encodeURIComponent(q),
    headers:{'Content-Type':'application/x-www-form-urlencoded'}});
  if(!r.ok) throw new Error('overpass '+r.status);
  const j=await r.json();
  const out=[];
  for(const e of (j.elements||[])){
    const lat=e.lat!=null? e.lat : (e.center&&e.center.lat), lng=e.lon!=null? e.lon : (e.center&&e.center.lon);
    if(lat==null) continue;
    const idx=nearestIdx(st.track,lat,lng);
    if(hav(st.track[idx],[lat,lng])>60) continue;
    const m=dists[idx], tags=e.tags||{};
    if(tags.railway==='level_crossing') out.push({type:'spoor', name:'Spoorwegovergang', km:m, endKm:null, note:'auto (OSM)'});
    else if(tags.junction==='roundabout') out.push({type:'rotonde', name:'Rotonde', km:m, endKm:null, note:'auto (OSM)'});
    else if(tags.tunnel) out.push({type:'tunnel', name:'Tunnel', km:m, endKm:null, note:'auto (OSM)'});
  }
  out.sort((a,b)=>a.km-b.km);
  const ded=[];
  for(const s of out){
    const l=ded[ded.length-1];
    if(l && l.type===s.type && s.km-l.km<120) continue;
    ded.push(s);
  }
  return ded;
}
async function analyzeRoute(){
  const st=cur.stage;
  if(!st.track.length){ alert('Laad eerst een route.'); return; }
  const dists=cumDist(st.track), kz=st.kmZero||0, totM=dists[dists.length-1];
  const btn=el('btnAnalyze'); btn.disabled=true; btn.textContent='🪄 analyseren…';
  try{
    let sugg=[];
    if(st.track.some(p=>p[2]!=null)){
      const step=100, n=Math.floor(totM/step);
      const ele=[];
      for(let i=0;i<=n;i++){ const p=pointAtDist(st.track,dists,i*step); ele.push(p?p[2]:null); }
      sugg.push(...findRuns(ele,step,1), ...findRuns(ele,step,-1));
    }
    sugg.push(...detectBends(st.track,dists));
    let osmError=false;
    try{ sugg.push(...await osmSuggest(st,dists)); }catch(e){ osmError=true; }
    reviewSuggestions(sugg, kz, osmError);
  } finally {
    btn.disabled=false; btn.textContent='🪄 Analyseer';
  }
}
function reviewSuggestions(sugg, kz, osmError){
  const st=cur.stage;
  sugg=sugg.filter(s=>!st.waymarkers.some(w=>w.type===s.type && Math.abs((kz+w.km*1000)-s.km)<150));
  sugg.sort((a,b)=>a.km-b.km);
  const osmNote=osmError? '<p style="color:var(--muted);font-size:12px">OSM-data (spoor/rotondes/tunnels) niet bereikbaar; alleen profiel- en bocht-analyse.</p>':'';
  if(!sugg.length){
    modal('<h2>🪄 Analyse</h2>'+osmNote+'<p>Geen nieuwe suggesties gevonden.</p><div class="btns"><button class="primary" onclick="closeModal()">OK</button></div>');
    return;
  }
  const rows=sugg.map((s,i)=>{
    const t=WM_TYPES[s.type];
    return '<label style="display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px">'+
      '<input type="checkbox" checked data-i="'+i+'" style="width:auto">'+t.em+' <b>'+((s.km-kz)/1000).toFixed(1)+'</b> '+esc(s.name||t.label)+
      (s.endKm!=null?' → '+((s.endKm-kz)/1000).toFixed(1):'')+' <span style="color:var(--muted)">'+esc(s.note)+'</span></label>';
  }).join('');
  modal('<h2>🪄 '+sugg.length+' suggesties</h2>'+osmNote+
    '<div class="row" style="margin:0 0 6px"><button class="small ghost" id="sugAll">alles aan/uit</button></div>'+
    '<div style="max-height:320px;overflow-y:auto">'+rows+'</div>'+
    '<div class="btns"><button class="ghost" onclick="closeModal()">Annuleer</button><button class="primary" id="sugGo">Voeg aangevinkte toe</button></div>',
    m=>{
      m.querySelector('#sugAll').onclick=()=>{
        const boxes=[...m.querySelectorAll('input[type=checkbox]')];
        const on=boxes.some(b=>!b.checked);
        boxes.forEach(b=>b.checked=on);
      };
      m.querySelector('#sugGo').onclick=()=>{
        m.querySelectorAll('input[type=checkbox]').forEach(cb=>{
          if(!cb.checked) return;
          const s=sugg[+cb.dataset.i];
          st.waymarkers.push({id:uid(), type:s.type, name:s.name, km:+((s.km-kz)/1000).toFixed(2),
            endKm: s.endKm!=null? +((s.endKm-kz)/1000).toFixed(2) : null,
            dir:s.dir||null, deg:s.deg||null, note:s.note});
        });
        save(); closeModal(); renderStage(false);
      };
    });
}

/* icoon per waymarker; bochten krijgen een gebogen pijl in de vorm en richting van de bocht */
function wmFace(w,t,pxSize){
  if(w.type==='bocht' && w.deg){
    const deg=Math.min(170,Math.abs(w.deg));
    const s=(w.dir==='L'?-1:1);
    const rad=deg*Math.PI/180;
    const dxn=Math.sin(rad)*s, dyn=-Math.cos(rad);   // richting ná de bocht
    const ex=12+7*dxn, ey=9+7*dyn;                    // einde van de boog
    const tx=ex+4.5*dxn, ty=ey+4.5*dyn;               // punt van de pijl
    const pxn=-dyn, pyn=dxn;                          // loodrecht op richting
    const b1x=ex+3.2*pxn, b1y=ey+3.2*pyn;
    const b2x=ex-3.2*pxn, b2y=ey-3.2*pyn;
    const d='M12 21 L12 13 Q12 9 '+ex.toFixed(1)+' '+ey.toFixed(1);
    const tri=tx.toFixed(1)+','+ty.toFixed(1)+' '+b1x.toFixed(1)+','+b1y.toFixed(1)+' '+b2x.toFixed(1)+','+b2y.toFixed(1);
    return {html:'<svg viewBox="0 0 24 24" width="'+pxSize+'" height="'+pxSize+'" style="display:block"><path d="'+d+'" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/><polygon points="'+tri+'" fill="#fff"/></svg>', bg:t.color};
  }
  return {html:t.em, bg:t.color+'22'};
}
/* vast nummer per waymarker (volgorde op km) */
function wmNumber(st){
  const s=[...st.waymarkers].sort((a,b)=>a.km-b.km);
  const m={}; s.forEach((w,i)=>m[w.id]=i+1); return m;
}
/* kleur op stijgingspercentage */
function gradColor(g){
  if(g==null) return '#5a6470';
  const p=g*100;
  if(p<-2) return '#3b82c4';
  if(p<2)  return '#3f9d5a';
  if(p<4)  return '#d8c93a';
  if(p<7)  return '#ff8c42';
  if(p<10) return '#e74c3c';
  return '#8e2020';
}
/* gesmoothde gradient per segment (±100 m venster) */
function smoothGrads(track,dists){
  const n=track.length, g=new Array(Math.max(0,n-1)).fill(null);
  for(let i=0;i<n-1;i++){
    let a=i,b=i+1;
    while(a>0 && dists[i]-dists[a]<100) a--;
    while(b<n-1 && dists[b]-dists[i+1]<100) b++;
    const dd=dists[b]-dists[a];
    if(dd>10 && track[a][2]!=null && track[b][2]!=null) g[i]=(track[b][2]-track[a][2])/dd;
  }
  return g;
}
/* nearest track index to latlng */
function nearestIdx(track, lat, lng){
  let best=0, bd=Infinity;
  for(let i=0;i<track.length;i++){
    const dx=track[i][0]-lat, dy=(track[i][1]-lng)*Math.cos(lat*Math.PI/180);
    const d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=i;}
  }
  return best;
}
/* point at distance m along track */
function pointAtDist(track, dists, m){
  if(!track.length) return null;
  if(m<=0) return track[0];
  if(m>=dists[dists.length-1]) return track[track.length-1];
  let lo=0, hi=dists.length-1;
  while(hi-lo>1){ const mid=(lo+hi)>>1; if(dists[mid]<m) lo=mid; else hi=mid; }
  const f=(m-dists[lo])/((dists[hi]-dists[lo])||1);
  return [ track[lo][0]+f*(track[hi][0]-track[lo][0]),
           track[lo][1]+f*(track[hi][1]-track[lo][1]),
           (track[lo][2]!=null&&track[hi][2]!=null)? track[lo][2]+f*(track[hi][2]-track[lo][2]) : null ];
}
/* simplify: keep max n points (uniform) */
function thin(track, n){
  if(track.length<=n) return track;
  const out=[], step=(track.length-1)/(n-1);
  for(let i=0;i<n;i++) out.push(track[Math.round(i*step)]);
  return out;
}

/* ================= GPX ================= */
function parseGpx(xmlText){
  const doc = new DOMParser().parseFromString(xmlText,'application/xml');
  if(doc.querySelector('parsererror')) throw new Error('Ongeldig GPX-bestand');
  let pts = [...doc.querySelectorAll('trkpt')];
  if(!pts.length) pts = [...doc.querySelectorAll('rtept')];
  if(!pts.length) throw new Error('Geen trackpunten gevonden in GPX');
  const track = pts.map(p=>{
    const e=p.querySelector('ele');
    return [ +(+p.getAttribute('lat')).toFixed(5), +(+p.getAttribute('lon')).toFixed(5), e? +(+e.textContent).toFixed(1):null ];
  });
  return thin(track, 4000);
}
function buildGpx(stage){
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const dists=cumDist(stage.track);
  const kz=stage.kmZero||0;
  let x='<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="RaceHub" xmlns="http://www.topografix.com/GPX/1/1">\n';
  x+='<metadata><name>'+esc(stage.name)+'</name></metadata>\n';
  if(kz>0){
    const p0=pointAtDist(stage.track,dists,kz);
    if(p0) x+='<wpt lat="'+p0[0]+'" lon="'+p0[1]+'">'+(p0[2]!=null?'<ele>'+p0[2]+'</ele>':'')+'<name>KM 0 - START</name><sym>Start</sym></wpt>\n';
  }
  const wsorted=[...stage.waymarkers].sort((a,b)=>a.km-b.km);
  for(let wi=0; wi<wsorted.length; wi++){
    const w=wsorted[wi];
    const p=pointAtDist(stage.track,dists,kz+w.km*1000);
    if(!p) continue;
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    x+='<wpt lat="'+p[0]+'" lon="'+p[1]+'">'+(p[2]!=null?'<ele>'+p[2]+'</ele>':'')+
       '<name>'+esc((wi+1)+' '+t.label.toUpperCase()+' '+(w.name||'')+' @'+w.km.toFixed(1)+'km')+'</name>'+
       (w.note?'<desc>'+esc(w.note)+'</desc>':'')+'<sym>'+esc(t.label)+'</sym></wpt>\n';
    if(w.endKm!=null && w.endKm>w.km){
      const pe=pointAtDist(stage.track,dists,kz+w.endKm*1000);
      if(pe) x+='<wpt lat="'+pe[0]+'" lon="'+pe[1]+'">'+(pe[2]!=null?'<ele>'+pe[2]+'</ele>':'')+
        '<name>'+esc((wi+1)+' EINDE '+t.label.toUpperCase()+' @'+w.endKm.toFixed(1)+'km')+'</name><sym>'+esc(t.label)+'</sym></wpt>\n';
    }
  }
  x+='<trk><name>'+esc(stage.name)+'</name><trkseg>\n';
  for(const p of stage.track) x+='<trkpt lat="'+p[0]+'" lon="'+p[1]+'">'+(p[2]!=null?'<ele>'+p[2]+'</ele>':'')+'</trkpt>\n';
  x+='</trkseg></trk>\n</gpx>';
  return x;
}
function download(name, text, type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:type||'application/octet-stream'}));
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}

/* ================= Elevation (Open-Meteo) for drawn routes ================= */
async function fetchElevations(track){
  const need=[]; track.forEach((p,i)=>{ if(p[2]==null) need.push(i); });
  if(!need.length) return false;
  try{
    for(let off=0; off<need.length; off+=90){
      const chunk=need.slice(off,off+90);
      const lats=chunk.map(i=>track[i][0]).join(','), lngs=chunk.map(i=>track[i][1]).join(',');
      const r=await fetch('https://api.open-meteo.com/v1/elevation?latitude='+lats+'&longitude='+lngs);
      const j=await r.json();
      chunk.forEach((ti,k)=>{ track[ti][2]=j.elevation[k]; });
    }
    return true;
  }catch(e){ console.warn('Hoogtedata ophalen mislukt', e); return false; }
}

    '<label>Datum</label><input id="mDate" type="date" value="'+(stage?.date||'')+'">'+
    '<div class="btns">'+(isNew?'':'<button class="danger" id="mDel">Verwijder</button>')+
    '<button class="ghost" onclick="closeModal()">Annuleer</button><button class="primary" id="mSave">Opslaan</button></div>',
    m=>{
      m.querySelector('#mSave').onclick=()=>{
        const name=m.querySelector('#mName').value.trim(); if(!name) return;
        if(isNew) race.stages.push({id:uid(),name,date:m.querySelector('#mDate').value,track:[],waymarkers:[],kmZero:0});
        else { stage.name=name; stage.date=m.querySelector('#mDate').value; }
        save(); closeModal(); renderHub(); refreshCrumb();
      };
      const del=m.querySelector('#mDel');
      if(del) del.onclick=()=>{ if(confirm('Etappe verwijderen?')){ race.stages=race.stages.filter(s=>s.id!==stage.id); save(); closeModal(); showHub(); } };

}

/* ================= STAGE view ================= */
function openStage(raceId, stageId){
  const race=state.races.find(r=>r.id===raceId); if(!race) return;
  const stage=race.stages.find(s=>s.id===stageId); if(!stage) return;
  cur={race,stage}; mode='view';
  el('hubView').classList.add('hidden');
  el('stageView').classList.remove('hidden');
  el('stT0').value=stage.t0time||'';
  el('stSpeed').value=stage.avgSpeed||'';
  refreshCrumb();
  initMap();
  renderStage(true);
}
function refreshCrumb(){
  if(!cur.stage){ el('crumb').innerHTML=''; return; }
  el('crumb').innerHTML='<a onclick="showHub()">← Seizoen</a> / <b>'+esc(cur.race.name)+'</b>'+
    (cur.race.stages.length>1?' / '+esc(cur.stage.name):'');
}
function initMap(){
  if(map) return;
  if(typeof L==='undefined'){
    el('map').innerHTML='<div style="display:flex;height:100%;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:20px">Kaart niet beschikbaar (geen internet).<br>Profiel en waymarkers werken gewoon.</div>';
    return;
  }
  map=L.map('map',{zoomControl:true}).setView([52.1,5.3],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  wmLayer=L.layerGroup().addTo(map);
  kmLayer=L.layerGroup().addTo(map);
  map.on('click', onMapClick);
  setTimeout(()=>map.invalidateSize(),100);
}
function setMode(m){
  mode = (mode===m)? 'view' : m;
  el('btnDraw').classList.toggle('active-mode', mode==='draw');
  el('btnAddWmMap').classList.toggle('active-mode', mode==='wm-map');
  const b=el('modeBanner');
  if(mode==='draw'){ b.textContent='Tekenmodus: klik op de kaart om routepunten toe te voegen'; b.style.display='block'; }
  else if(mode==='wm-map'){ b.textContent='Klik op de route om een waymarker te plaatsen'; b.style.display='block'; }
  else { b.style.display='none'; }
  if(m==='draw' && mode==='view'){ finishDrawing(); }
}
async function finishDrawing(){
  const st=cur.stage;
  if(st.track.some(p=>p[2]==null)){
    const ok=await fetchElevations(st.track);
    if(ok){ save(); renderStage(false); }
  }
}
function onMapClick(e){
  const st=cur.stage; if(!st) return;
  if(mode==='draw'){
    st.track.push([+e.latlng.lat.toFixed(5), +e.latlng.lng.toFixed(5), null]);
    save(); renderStage(false);
  } else if(mode==='wm-map'){
    if(!st.track.length){ alert('Laad of teken eerst een route.'); return; }
    const dists=cumDist(st.track);
    const idx=nearestIdx(st.track, e.latlng.lat, e.latlng.lng);
    setMode('view');
    wmModal(null, (dists[idx]-(st.kmZero||0))/1000);
  }
}

function renderStage(fit){
  const st=cur.stage; if(!st) return;
  const dists = st.track.length? cumDist(st.track):[0];
  const kz = st.kmZero||0;
  const totKm = (dists[dists.length-1]-kz)/1000;
  const sorted=[...st.waymarkers].sort((a,b)=>a.km-b.km);
  const nrs=wmNumber(st);

  // stats
  const hasEle = st.track.length && st.track.some(p=>p[2]!=null);
  el('stageStats').innerHTML =
    '<span><b>'+totKm.toFixed(1)+'</b> km</span>'+
    (kz>0? '<span><b>'+(kz/1000).toFixed(1)+'</b> km neutraal</span>':'')+
    (hasEle? '<span><b>'+totalAscent(st.track)+'</b> hm</span>':'')+
    '<span><b>'+st.waymarkers.length+'</b> waymarkers</span>'+
    '<span><b>'+st.track.length+'</b> punten</span>';

  // route line
  if(map){
  if(routeLine){ map.removeLayer(routeLine); routeLine=null; }
  kmLayer.clearLayers();
  if(st.track.length){
    const latlngs=st.track.map(p=>[p[0],p[1]]);
    routeLine=L.polyline(latlngs,{color:'#ff6b1a',weight:4,opacity:.9}).addTo(map);
    if(fit) map.fitBounds(routeLine.getBounds(),{padding:[30,30]});
    // km labels every 10 km (geteld vanaf km 0)
    for(let m=kz+10000; m<dists[dists.length-1]; m+=10000){
      const p=pointAtDist(st.track,dists,m);
      L.marker([p[0],p[1]],{icon:L.divIcon({className:'kmlabel',html:((m-kz)/1000)+'',iconSize:[24,14]}),interactive:false}).addTo(kmLayer);
    }
    // start / finish dots (grijs = vertrek neutralisatie, groen = km 0, rood = finish)
    if(kz>0){
      L.circleMarker(latlngs[0],{radius:5,color:'#fff',fillColor:'#8a99ab',fillOpacity:1,weight:2}).addTo(kmLayer);
      const p0=pointAtDist(st.track,dists,kz);
      if(p0) L.circleMarker([p0[0],p0[1]],{radius:6,color:'#fff',fillColor:'#2ecc71',fillOpacity:1,weight:2}).addTo(kmLayer);
    } else {
      L.circleMarker(latlngs[0],{radius:6,color:'#fff',fillColor:'#2ecc71',fillOpacity:1,weight:2}).addTo(kmLayer);
    }
    L.circleMarker(latlngs[latlngs.length-1],{radius:6,color:'#fff',fillColor:'#e74c3c',fillOpacity:1,weight:2}).addTo(kmLayer);
  }

  // waymarkers on map
  wmLayer.clearLayers();
  for(const w of sorted){
    if(w.endKm!=null && w.endKm>w.km){
      const t=WM_TYPES[w.type]||WM_TYPES.info;
      const ll=sectorLatLngs(st,dists,kz,w);
      if(ll.length>1) L.polyline(ll,{color:t.color,weight:8,opacity:.55,interactive:false}).addTo(wmLayer);
    }
  }
  for(const w of sorted){
    const p=pointAtDist(st.track,dists,kz+w.km*1000); if(!p) continue;
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    const sec=sectorText(st,w,dists,kz);
    const face=wmFace(w,t,17);
    const mk=L.marker([p[0],p[1]],{icon:L.divIcon({
      className:'', html:'<div style="position:relative;width:26px;height:26px"><div class="wm-divicon" style="width:26px;height:26px;background:'+face.bg+';border-color:'+t.color+'">'+face.html+'</div><div class="wm-nr">'+nrs[w.id]+'</div></div>',
      iconSize:[26,26], iconAnchor:[13,13]})});
    mk.bindPopup('<b>#'+nrs[w.id]+' '+t.em+' '+esc(w.name||t.label)+'</b><br>km '+w.km.toFixed(1)+
      (sec?' · '+sec:'')+(etaText(st,w.km)?' · ~'+etaText(st,w.km):'')+(w.note?'<br>'+esc(w.note):'')+
      '<br><a href="https://www.google.com/maps?layer=c&cbll='+p[0]+','+p[1]+'" target="_blank">StreetView</a> · '+
      '<a href="#" onclick="rhCopy(\''+p[0].toFixed(5)+', '+p[1].toFixed(5)+'\');return false;">kopieer lat/lng</a>');
    mk.on('dblclick',()=>wmModal(w,null));
    mk.addTo(wmLayer);
  }
  } // end if(map)

  // waymarker list
  const list=el('wmList'); list.innerHTML='';
  if(!sorted.length) list.innerHTML='<div class="empty-note" style="padding:16px;font-size:13px">Nog geen waymarkers.<br>Voeg klimmen, sprints, gevaren en bevoorrading toe.</div>';
  for(const w of sorted){
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    const sec=sectorText(st,w,dists,kz), eta=etaText(st,w.km);
    const face=wmFace(w,t,18);
    const div=document.createElement('div'); div.className='wm-item';
    div.innerHTML='<div class="nr-chip">'+nrs[w.id]+'</div><div class="ic" style="background:'+face.bg+';border:1px solid '+t.color+'">'+face.html+'</div>'+
      '<div class="nm"><div class="t">'+esc(w.name||t.label)+(sec?' <span style="color:var(--accent2);font-size:12px">'+sec+'</span>':'')+'</div>'+
      '<div class="s">'+t.label+(w.type==='bocht'&&w.deg? ' '+(w.dir==='L'?'links':'rechts')+' '+w.deg+'°':'')+(eta?' · ~'+eta:'')+(w.note?' · '+esc(w.note):'')+'</div></div>'+
      '<div class="km">'+w.km.toFixed(1)+'</div>';
    const del=document.createElement('button'); del.className='del'; del.textContent='✕';
    del.onclick=e=>{ e.stopPropagation(); st.waymarkers=st.waymarkers.filter(x=>x.id!==w.id); save(); renderStage(false); };
    div.appendChild(del);
    div.onclick=()=>{
      const p=pointAtDist(st.track,dists,kz+w.km*1000);
      if(p && map) map.setView([p[0],p[1]], Math.max(map.getZoom(),14));
    };
    div.ondblclick=()=>wmModal(w,null);
    list.appendChild(div);
  }

  drawProfile();
}

    '<div class="btns"><button class="ghost" onclick="closeModal()">Annuleer</button><button class="primary" id="mSave">Opslaan</button></div>',

          b.style.display = WM_TYPES[b.dataset.t].label.toLowerCase().includes(q)? '':'none';

    });

/* ================= Elevation profile (canvas) ================= */
const PADL=44, PADR=12, PADT=26, PADB=20;
let profGeom=null;
function drawProfile(){
  const st=cur.stage; const cv=el('profile'); if(!cv||!st) return;
  const wrap=el('profileWrap');
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth, H=wrap.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#161d27'; ctx.fillRect(0,0,W,H);

  const track=st.track;
  if(!track.length || !track.some(p=>p[2]!=null)){
    ctx.fillStyle='#8a99ab'; ctx.font='13px system-ui'; ctx.textAlign='center';
    ctx.fillText(track.length?'Geen hoogtedata (teken af en verbind met internet voor hoogte)':'Geen route geladen', W/2, H/2);
    profGeom=null; return;
  }
  const dists=cumDist(track), totM=dists[dists.length-1];
  const kz=st.kmZero||0;
  let minE=Infinity,maxE=-Infinity;
  for(const p of track){ if(p[2]==null)continue; if(p[2]<minE)minE=p[2]; if(p[2]>maxE)maxE=p[2]; }
  if(maxE-minE<50){ const mid=(maxE+minE)/2; minE=mid-25; maxE=mid+25; }
  const pad=(maxE-minE)*0.12; minE-=pad; maxE+=pad;
  const px = m => PADL+(m/totM)*(W-PADL-PADR);
  const py = e => PADT+(1-(e-minE)/(maxE-minE))*(H-PADT-PADB);
  profGeom={px,py,totM,dists,minE,maxE,W,H,kz};

  // grid: horizontal elevation lines
  ctx.strokeStyle='#2a3646'; ctx.fillStyle='#8a99ab'; ctx.font='10px system-ui'; ctx.lineWidth=1;
  const eStep = niceStep((maxE-minE)/3);
  for(let e=Math.ceil(minE/eStep)*eStep; e<maxE; e+=eStep){
    ctx.beginPath(); ctx.moveTo(PADL,py(e)); ctx.lineTo(W-PADR,py(e)); ctx.stroke();
    ctx.textAlign='right'; ctx.fillText(Math.round(e)+' m', PADL-5, py(e)+3);
  }
  // vertical km lines (relatief t.o.v. km 0)
  const kStep = niceStep((totM-kz)/1000/8)*1000;
  for(let m=kz+kStep; m<totM; m+=kStep){
    ctx.strokeStyle='#222c3a'; ctx.beginPath(); ctx.moveTo(px(m),PADT); ctx.lineTo(px(m),H-PADB); ctx.stroke();
    ctx.textAlign='center'; ctx.fillStyle='#8a99ab'; ctx.fillText(((m-kz)/1000)+'', px(m), H-6);
  }

  // vlakken gekleurd op stijgingspercentage
  const grads=smoothGrads(track,dists);
  let lastE=track[0][2]??minE;
  for(let i=1;i<track.length;i++){
    const e=track[i][2]??lastE;
    const x1=px(dists[i-1]), x2=px(dists[i]);
    if(x2>x1){
      ctx.fillStyle=gradColor(grads[i-1])+'d9';
      ctx.beginPath(); ctx.moveTo(x1,py(lastE)); ctx.lineTo(x2,py(e));
      ctx.lineTo(x2,H-PADB); ctx.lineTo(x1,H-PADB); ctx.closePath(); ctx.fill();
    }
    lastE=e;
  }
  ctx.beginPath(); lastE=track[0][2]??minE; ctx.moveTo(px(0),py(lastE));
  for(let i=1;i<track.length;i++){ const e=track[i][2]??lastE; lastE=e; ctx.lineTo(px(dists[i]),py(e)); }
  ctx.strokeStyle='#ffffff55'; ctx.lineWidth=1.2; ctx.stroke();

  // neutralisatie-zone arceren + km 0 lijn
  if(kz>0){
    ctx.fillStyle='#ffffff14'; ctx.fillRect(px(0),PADT,px(kz)-px(0),H-PADT-PADB);
    ctx.strokeStyle='#c9d4e0'; ctx.setLineDash([5,4]); ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(px(kz),PADT); ctx.lineTo(px(kz),H-PADB); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#c9d4e0'; ctx.textAlign='center'; ctx.font='10px system-ui';
    ctx.fillText('km 0', px(kz), H-6);
    if(px(kz)-px(0)>40) ctx.fillText('neutraal', (px(0)+px(kz))/2, PADT+12);
  }

  // sectorbalken onderin
  for(const w of st.waymarkers){
    if(w.endKm==null || w.endKm<=w.km) continue;
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    const a=Math.max(0,kz+w.km*1000), b=Math.min(totM,kz+w.endKm*1000);
    if(b<=a) continue;
    ctx.fillStyle=t.color;
    ctx.fillRect(px(a), H-PADB-4, px(b)-px(a), 4);
  }

  // waymarkers
  for(const w of st.waymarkers){
    const m=kz+w.km*1000; if(m<0||m>totM) continue;
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    const x=px(m);
    const p=pointAtDist(track,dists,m);
    const y=p&&p[2]!=null? py(p[2]) : H-PADB;
    ctx.strokeStyle=t.color; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,14); ctx.stroke();
    ctx.font='12px system-ui'; ctx.textAlign='center';
    ctx.fillText(t.em, x, 12);
  }
}
function niceStep(raw){
  const p=Math.pow(10,Math.floor(Math.log10(raw||1)));
  for(const m of [1,2,5,10]) if(raw<=m*p) return m*p;
  return 10*p;
}
/* profile hover + click */
(function(){
  const cv=el('profile'), tip=el('profTip');
  function evtM(e){
    if(!profGeom) return null;
    const r=cv.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const f=(x-PADL)/(profGeom.W-PADL-PADR);
    if(f<0||f>1) return null;
    return f*profGeom.totM;
  }
  cv.addEventListener('mousemove',e=>{
    const m=evtM(e); const st=cur.stage;
    if(m==null||!st){ tip.style.display='none'; return; }
    const p=pointAtDist(st.track,profGeom.dists,m);
    tip.style.display='block';
    tip.style.left=Math.min(e.offsetX+12, profGeom.W-110)+'px'; tip.style.top='8px';
    tip.textContent=((m-profGeom.kz)/1000).toFixed(1)+' km'+(p&&p[2]!=null? ' · '+Math.round(p[2])+' m':'');
    if(p && map){
      if(!posDot) posDot=L.circleMarker([p[0],p[1]],{radius:7,color:'#fff',fillColor:'#3ba3ff',fillOpacity:1,weight:2}).addTo(map);
      else posDot.setLatLng([p[0],p[1]]);
    }
  });
  cv.addEventListener('mouseleave',()=>{ tip.style.display='none'; if(posDot&&map){map.removeLayer(posDot);posDot=null;} });
  cv.addEventListener('click',e=>{
    const m=evtM(e); const st=cur.stage; if(m==null||!st) return;
    const p=pointAtDist(st.track,profGeom.dists,m);
    if(p && map) map.setView([p[0],p[1]], Math.max(map.getZoom(),13));
  });
})();

/* ================= Roadbook (print) ================= */
function roadbook(){
  const st=cur.stage; if(!st) return;
  const dists=st.track.length?cumDist(st.track):[0];
  const kz=st.kmZero||0;
  const totKm=(dists[dists.length-1]-kz)/1000;
  const rows=[...st.waymarkers].sort((a,b)=>a.km-b.km).map((w,i)=>{
    const t=WM_TYPES[w.type]||WM_TYPES.info;

    '<p>'+totKm.toFixed(1)+' km'+(kz>0?' · neutralisatie '+(kz/1000).toFixed(1)+' km':'')+' · '+(st.track.some(p=>p[2]!=null)? totalAscent(st.track)+' hm · ':'')+st.waymarkers.length+' waymarkers</p>'+
    '<table><tr><th>#</th><th>km</th><th>nog te gaan</th><th>tijd</th><th>type</th><th>naam</th><th>lengte</th><th>notitie</th></tr>'+rows+'</table>'+

/* ================= LIVE view ================= */
const live={watch:null,lastIdx:0,simT:null,simM:0,speed:0,lastFix:null,wake:null,dists:null,kz:0,totM:0,curM:null,zoomKm:null,follow:true,t0:null,prevM:null,cumAsc:null,totAsc:0,clockT:null};

function enterLive(){
  const st=cur.stage;
  if(!st || !st.track.length){ alert('Laad eerst een route voor deze etappe.'); return; }
  live.dists=cumDist(st.track); live.kz=st.kmZero||0; live.totM=live.dists[live.dists.length-1];
  live.lastIdx=0; live.speed=0; live.lastFix=null; live.curM=null; live.zoomKm=null; live.follow=true;
  live.t0=null; live.prevM=null;
  // cumulatieve klimmeters voorberekenen
  live.cumAsc=new Array(st.track.length).fill(0);
  { let up=0,lastEle=null;
    for(let i=0;i<st.track.length;i++){
      const e=st.track[i][2];
      if(e!=null){ if(lastEle!=null&&e>lastEle) up+=e-lastEle; lastEle=e; }
      live.cumAsc[i]=up;
    }
    live.totAsc=up;
  }
  if(live.clockT) clearInterval(live.clockT);
  live.clockT=setInterval(()=>{ if(live.t0!=null && live.curM!=null) updateClockTiles(); },5000);
  el('liveView').classList.remove('hidden');
  el('lvName').textContent=cur.race.name+(cur.race.stages.length>1?' · '+st.name:'');
  el('lvStatus').textContent='GPS zoeken…';
  if(liveMap && !el('lvMapWrap').classList.contains('hidden')) setTimeout(()=>{ liveMap.invalidateSize(); buildLiveMap(); },150);
  startGps();
  if(navigator.wakeLock) navigator.wakeLock.request('screen').then(w=>live.wake=w).catch(()=>{});
  updateLive(null);
}
function exitLive(){
  el('liveView').classList.add('hidden');
  if(live.watch!=null && navigator.geolocation){ navigator.geolocation.clearWatch(live.watch); live.watch=null; }
  if(live.clockT){ clearInterval(live.clockT); live.clockT=null; }
  stopSim();
  if(live.wake){ live.wake.release().catch(()=>{}); live.wake=null; }
}
function startGps(){
  if(!navigator.geolocation){ el('lvStatus').textContent='Geen GPS – gebruik SIM'; return; }
  live.watch=navigator.geolocation.watchPosition(pos=>{
    if(live.simT) return; // simulatie heeft voorrang
    const lat=pos.coords.latitude, lng=pos.coords.longitude, sp=pos.coords.speed;
    if(sp!=null && !isNaN(sp)) live.speed=sp*3.6;
    else if(live.lastFix){
      const dt=(pos.timestamp-live.lastFix.t)/1000;
      if(dt>0.5) live.speed=(hav([live.lastFix.lat,live.lastFix.lng],[lat,lng])/dt)*3.6;
    }
    live.lastFix={lat,lng,t:pos.timestamp};
    el('lvStatus').textContent='GPS ✓ ±'+Math.round(pos.coords.accuracy)+' m';
    positionOnRoute(lat,lng);
  }, err=>{
    el('lvStatus').textContent='Geen GPS-toegang – gebruik SIM';
  }, {enableHighAccuracy:true, maximumAge:1000, timeout:15000});
}
/* zoek positie op route; eerst lokaal rond laatste index (lusbestendig), anders globaal */
function positionOnRoute(lat,lng){
  const track=cur.stage.track;
  const lo=Math.max(0,live.lastIdx-40), hi=Math.min(track.length-1, live.lastIdx+400);
  let best=lo, bd=Infinity;
  for(let i=lo;i<=hi;i++){ const d=hav(track[i],[lat,lng]); if(d<bd){bd=d;best=i;} }
  if(bd>400){
    let gb=0, gd=Infinity;
    for(let i=0;i<track.length;i++){ const d=hav(track[i],[lat,lng]); if(d<gd){gd=d;gb=i;} }
    best=gb; bd=gd;
  }
  live.lastIdx=best;
  el('lvOff').style.display = bd>200? 'block':'none';
  updateLive(live.dists[best]);
}
function updateLive(m){
  const st=cur.stage; live.curM=m;
  if(m==null){
    el('lvKm').textContent='–'; el('lvToGo').textContent='–'; el('lvSpeed').textContent='–';
    el('lvHm').textContent='–'; el('lvElapsed').textContent='–'; el('lvAvg').textContent='–';
    el('lvNext').innerHTML='<div class="empty-note">Wachten op positie… (of start SIM)</div>';
    el('lvAlert').style.display='none';
    drawLiveProfile(null); return;
  }
  const rel=(m-live.kz)/1000;
  el('lvKm').textContent=rel.toFixed(1);
  el('lvToGo').textContent=Math.max(0,(live.totM-m)/1000).toFixed(1);
  el('lvSpeed').textContent=String(Math.round(live.speed));
  el('lvHm').textContent=String(Math.max(0,Math.round(live.totAsc-(live.cumAsc[live.lastIdx]||0))));
  // km 0-passage automatisch registreren
  if(live.t0==null && live.prevM!=null && live.prevM<live.kz && m>=live.kz) live.t0=Date.now();
  live.prevM=m;
  updateClockTiles();
  const nrs=wmNumber(st);
  const all=[...st.waymarkers].map(w=>({...w, absM:live.kz+w.km*1000})).sort((a,b)=>a.absM-b.absM);
  const upcoming=all.filter(w=>w.absM>=m).slice(0,8);
  const passedAll=all.filter(w=>w.absM<m);
  const lastPassed=(passedAll.length && m-passedAll[passedAll.length-1].absM<=500)? passedAll[passedAll.length-1] : null;
  const list=el('lvNext'); list.innerHTML='';
  const mkRow=(w,cls,distTxt)=>{
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    const sec=sectorText(st,w,live.dists,live.kz);
    const face=wmFace(w,t,28);
    const div=document.createElement('div'); div.className='lv-wm'+cls;
    div.innerHTML='<div class="nr-chip">'+nrs[w.id]+'</div><div class="ic" style="background:'+face.bg+';border:2px solid '+t.color+'">'+face.html+'</div>'+
      '<div class="inf"><div class="t">'+esc(w.name||t.label)+(sec?' <span style="font-size:14px;color:var(--accent2)">'+sec+'</span>':'')+'</div>'+
      '<div class="s">'+t.label+(w.type==='bocht'&&w.deg? ' '+(w.dir==='L'?'links':'rechts')+' '+w.deg+'°':'')+' · km '+w.km.toFixed(1)+(w.note?' · '+esc(w.note):'')+'</div></div>'+
      '<div class="d">'+distTxt+'</div>';
    list.appendChild(div);
  };
  if(lastPassed) mkRow(lastPassed,' passed','-'+((m-lastPassed.absM)/1000).toFixed(1)+' <small>km</small>');
  if(!upcoming.length && !lastPassed) list.innerHTML='<div class="empty-note">Geen waymarkers meer tot de finish.</div>';
  upcoming.forEach((w,i)=>mkRow(w, i===0?' first':'', Math.max(0,(w.absM-m)/1000).toFixed(1)+' <small>km</small>'));
  // aankondiging: eerstvolgende waymarker binnen 1,2 km
  const al=el('lvAlert');
  if(upcoming.length && (upcoming[0].absM-m)<=800){
    const w0=upcoming[0], t0=WM_TYPES[w0.type]||WM_TYPES.info, d0=Math.max(0,w0.absM-m);
    al.style.display='flex';
    al.querySelector('.ic').innerHTML=wmFace(w0,t0,40).html;
    al.querySelector('.d').textContent= d0<1000? (Math.round(d0/10)*10)+' m' : (d0/1000).toFixed(1)+' km';
    al.querySelector('.n').textContent='#'+nrs[w0.id]+' · '+(w0.name||t0.label)+(w0.note?' · '+w0.note:'');
  } else al.style.display='none';
  drawLiveProfile(m);
  updateLiveMap(m);
}
/* tegels: verstreken tijd + gemiddelde sinds km 0 */
function fmtDur(ms){
  const s=Math.floor(ms/1000), h=Math.floor(s/3600), mi=Math.floor((s%3600)/60);
  return h+':'+String(mi).padStart(2,'0');
}
function updateClockTiles(){
  if(live.t0==null || live.curM==null){ el('lvElapsed').textContent='–'; el('lvAvg').textContent='–'; return; }
  const ms=Date.now()-live.t0;
  el('lvElapsed').textContent=fmtDur(ms);
  const kmDone=(live.curM-live.kz)/1000;
  el('lvAvg').textContent = (ms>60000 && kmDone>0)? (kmDone/(ms/3600000)).toFixed(1)+' km/u' : '–';
}

      mo.querySelector('#cNow').onclick=()=>{

        const winSec=p.length===3? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];

        }
        mo.querySelector('#cResult').textContent=txt;
      };
      mo.querySelector('#cWin').addEventListener('input',calc);
      mo.querySelector('#cPct').addEventListener('input',calc);
    });

/* meeschuivend profiel: venster van 20 km, positie op 15% */
function drawLiveProfile(m){
  const st=cur.stage, cv=el('liveProfile'); if(!cv||!st) return;
  const wrap=cv.parentElement, dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth||300, H=wrap.clientHeight||150;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle='#10161e'; ctx.fillRect(0,0,W,H);
  const track=st.track; if(!track.length) return;
  const dists=live.dists, totM=live.totM, kz=live.kz;
  const winLen=Math.min(20000,totM);
  const a = m==null? 0 : Math.max(0, Math.min(m-winLen*0.15, totM-winLen));
  const b = a+winLen;
  const PL=36,PR=10,PT=18,PB=16;
  const px=mm=>PL+((mm-a)/(b-a))*(W-PL-PR);
  let minE=Infinity,maxE=-Infinity;
  for(let i=0;i<track.length;i++){
    if(dists[i]<a||dists[i]>b) continue;
    const e=track[i][2]; if(e==null) continue;
    if(e<minE)minE=e; if(e>maxE)maxE=e;
  }
  const hasEle=isFinite(minE);
  if(!hasEle){ minE=0; maxE=1; }
  if(maxE-minE<40){ const mid=(maxE+minE)/2; minE=mid-20; maxE=mid+20; }
  const padE=(maxE-minE)*0.12; minE-=padE; maxE+=padE;
  const py=e=>PT+(1-(e-minE)/(maxE-minE))*(H-PT-PB);
  ctx.font='10px system-ui'; ctx.textAlign='center';
  const gStep=5000;
  for(let gm=Math.ceil((a-kz)/gStep)*gStep+kz; gm<=b; gm+=gStep){
    ctx.strokeStyle='#222c3a'; ctx.beginPath(); ctx.moveTo(px(gm),PT); ctx.lineTo(px(gm),H-PB); ctx.stroke();
    ctx.fillStyle='#8a99ab'; ctx.fillText(((gm-kz)/1000)+'', px(gm), H-4);
  }
  if(kz>a && kz<b){
    ctx.fillStyle='#ffffff12'; ctx.fillRect(px(a),PT,px(Math.min(kz,b))-px(a),H-PT-PB);
  }
  // vlakken gekleurd op stijgingspercentage
  const grads=smoothGrads(track,dists);
  let lastE=null;
  for(let i=1;i<track.length;i++){
    if(dists[i]<a){ lastE=track[i][2]??lastE; continue; }
    if(dists[i-1]>b) break;
    const e1=track[i-1][2]??lastE??minE, e2=track[i][2]??e1;
    lastE=e2;
    const x1=px(Math.max(dists[i-1],a)), x2=px(Math.min(dists[i],b));
    if(x2<=x1) continue;
    ctx.fillStyle=gradColor(grads[i-1])+'d9';
    ctx.beginPath(); ctx.moveTo(x1,py(e1)); ctx.lineTo(x2,py(e2));
    ctx.lineTo(x2,H-PB); ctx.lineTo(x1,H-PB); ctx.closePath(); ctx.fill();
  }
  ctx.beginPath(); let started=false; lastE=minE;
  for(let i=0;i<track.length;i++){
    if(dists[i]<a){ lastE=track[i][2]??lastE; continue; }
    if(dists[i]>b) break;
    const e=track[i][2]??lastE; lastE=e;
    if(!started){ ctx.moveTo(px(dists[i]),py(e)); started=true; }
    else ctx.lineTo(px(dists[i]),py(e));
  }
  if(started){ ctx.strokeStyle='#ffffff55'; ctx.lineWidth=1.4; ctx.stroke(); }
  for(const w of st.waymarkers){
    if(w.endKm==null || w.endKm<=w.km) continue;
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    const sa=Math.max(a,kz+w.km*1000), sb=Math.min(b,kz+w.endKm*1000);
    if(sb<=sa) continue;
    ctx.fillStyle=t.color;
    ctx.fillRect(px(sa), H-PB-4, px(sb)-px(sa), 4);
  }
  for(const w of st.waymarkers){
    const wm=kz+w.km*1000; if(wm<a||wm>b) continue;
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    ctx.strokeStyle=t.color; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(px(wm),PT+8); ctx.lineTo(px(wm),H-PB); ctx.stroke();
    ctx.fillText(t.em, px(wm), PT+4);
  }
  if(m!=null){
    const p=pointAtDist(track,dists,m);
    const yy=(p&&p[2]!=null)? py(p[2]) : H-PB;
    ctx.strokeStyle='#3ba3ff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(px(m),PT); ctx.lineTo(px(m),H-PB); ctx.stroke();
    ctx.fillStyle='#3ba3ff'; ctx.beginPath(); ctx.arc(px(m),yy,5,0,7); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(px(m),yy,5,0,7); ctx.stroke();
  }
}
/* live kaart */
let liveMap=null, lvRoute=null, lvWms=null, lvPos=null;
function toggleLiveMap(){
  const w=el('lvMapWrap');
  w.classList.toggle('hidden');
  const open=!w.classList.contains('hidden');
  el('lvMapBtn').classList.toggle('active-mode', open);
  if(open){
    if(typeof L==='undefined'){
      w.innerHTML='<div style="display:flex;height:100%;align-items:center;justify-content:center;color:var(--muted)">Kaart niet beschikbaar (geen internet)</div>';
      return;
    }
    if(!liveMap){
      liveMap=L.map('lvMap',{zoomControl:false,preferCanvas:true});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(liveMap);
      lvWms=L.layerGroup().addTo(liveMap);
      [1,2,5,10,25,'Full'].forEach(k=>{
        const b=document.createElement('button');
        b.textContent = k==='Full'? 'Alles' : k+' km';
        b.onclick=()=>zoomPreset(k,b);
        el('lvZooms').appendChild(b);
      });
    }
    setTimeout(()=>{
      liveMap.invalidateSize();
      buildLiveMap();
      if(live.curM!=null) updateLiveMap(live.curM);
    },150);
  }
  drawLiveProfile(live.curM);
}
function buildLiveMap(){
  if(!liveMap) return;
  const st=cur.stage;
  if(lvRoute){ liveMap.removeLayer(lvRoute); lvRoute=null; }
  if(lvPos){ liveMap.removeLayer(lvPos); lvPos=null; }
  lvWms.clearLayers();
  if(!st.track.length) return;
  lvRoute=L.polyline(st.track.map(p=>[p[0],p[1]]),{color:'#ff6b1a',weight:4,opacity:.9}).addTo(liveMap);
  const dists=live.dists||cumDist(st.track), kz=st.kmZero||0;
  const nrs=wmNumber(st);
  for(const w of st.waymarkers){
    if(w.endKm!=null && w.endKm>w.km){
      const t=WM_TYPES[w.type]||WM_TYPES.info;
      const ll=sectorLatLngs(st,dists,kz,w);
      if(ll.length>1) L.polyline(ll,{color:t.color,weight:8,opacity:.55,interactive:false}).addTo(lvWms);
    }
  }
  for(const w of st.waymarkers){
    const p=pointAtDist(st.track,dists,kz+w.km*1000); if(!p) continue;
    const t=WM_TYPES[w.type]||WM_TYPES.info;
    const face=wmFace(w,t,16);
    L.marker([p[0],p[1]],{icon:L.divIcon({className:'',html:'<div style="position:relative;width:24px;height:24px"><div class="wm-divicon" style="width:24px;height:24px;background:'+face.bg+';border-color:'+t.color+'">'+face.html+'</div><div class="wm-nr">'+nrs[w.id]+'</div></div>',iconSize:[24,24],iconAnchor:[12,12]}),interactive:false}).addTo(lvWms);
  }
  liveMap.fitBounds(lvRoute.getBounds(),{padding:[20,20]});
}
function updateLiveMap(m){
  if(!liveMap || el('lvMapWrap').classList.contains('hidden') || m==null) return;
  const p=pointAtDist(cur.stage.track,live.dists,m); if(!p) return;
  if(!lvPos) lvPos=L.circleMarker([p[0],p[1]],{radius:8,color:'#fff',fillColor:'#3ba3ff',fillOpacity:1,weight:2}).addTo(liveMap);
  else lvPos.setLatLng([p[0],p[1]]);
  if(!live.follow) return; // 'Alles' gekozen: overzicht laten staan
  if(live.zoomKm) applyZoomKm(p);
  else liveMap.setView([p[0],p[1]], Math.max(liveMap.getZoom()||14,13), {animate:false});
}
/* zoom-presets: kaartbreedte ≈ gekozen km, gecentreerd op positie */
function zoomPreset(k,btn){
  if(!liveMap) return;
  el('lvZooms').querySelectorAll('button').forEach(x=>x.classList.toggle('active-mode',x===btn));
  if(k==='Full'){
    live.zoomKm=null; live.follow=false;
    if(lvRoute) liveMap.fitBounds(lvRoute.getBounds(),{padding:[20,20]});
    return;
  }
  live.zoomKm=k; live.follow=true;
  const p = live.curM!=null? pointAtDist(cur.stage.track,live.dists,live.curM) : cur.stage.track[0];
  if(p) applyZoomKm(p);
}
function applyZoomKm(p){
  const km=live.zoomKm; if(!km||!p) return;
  const dLat=(km*1000/2)/111320;
  const dLng=(km*1000/2)/(111320*Math.cos(p[0]*Math.PI/180));
  liveMap.fitBounds([[p[0]-dLat,p[1]-dLng],[p[0]+dLat,p[1]+dLng]],{animate:false});
}

/* simulatie: virtueel over het parcours rijden */
function startSim(){
  stopSim();
  live.speed=42;
  live.simM = live.curM!=null? live.curM : 0;
  live.simT=setInterval(()=>{
    live.speed=42;
    live.simM+=(42/3.6)*2; // 2 sec per tick
    if(live.simM>=live.totM){ live.simM=live.totM; updateLiveFromM(live.simM); stopSim(); return; }
    updateLiveFromM(live.simM);
  },2000);
  el('lvSim').classList.add('active-mode');
  el('lvStatus').textContent='SIMULATIE · 42 km/u';
  updateLiveFromM(live.simM);
}
function stopSim(){
  if(live.simT){ clearInterval(live.simT); live.simT=null; el('lvSim').classList.remove('active-mode'); }
}
function updateLiveFromM(m){
  let lo=0, hi=live.dists.length-1;
  while(hi-lo>1){ const mid=(lo+hi)>>1; if(live.dists[mid]<m) lo=mid; else hi=mid; }
  live.lastIdx=lo;
  el('lvOff').style.display='none';
  updateLive(m);
}
el('btnLive').onclick=enterLive;
el('lvExit').onclick=exitLive;
el('lvMapBtn').onclick=toggleLiveMap;
el('lvClock').onclick=clockModal;
window.rhCopy=t=>{ (navigator.clipboard? navigator.clipboard.writeText(t) : Promise.reject()).then(()=>{},()=>prompt('Kopieer:',t)); };
el('lvSim').onclick=()=>{ if(live.simT){ stopSim(); el('lvStatus').textContent='SIM gestopt'; } else startSim(); };

/* ================= Wire up ================= */
el('btnAddRace').onclick=()=>raceModal(null);
el('btnGpx').onclick=()=>el('gpxFile').click();
el('gpxFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      cur.stage.track=parseGpx(rd.result);
      cur.stage.kmZero=0;
      save(); renderStage(true);
    }catch(err){ alert(err.message); }
  };
  rd.readAsText(f);
  e.target.value='';
});
el('btnNeutral').onclick=()=>{
  if(!cur.stage.track.length){ alert('Laad eerst de route zelf; daarna de neutralisatie-GPX.'); return; }
  el('neutralFile').click();
};
el('neutralFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const st=cur.stage;
      const neutral=parseGpx(rd.result);
      const nd=cumDist(neutral);
      const gap=hav(neutral[neutral.length-1], st.track[0]); // eventueel gat telt bij neutraal
      st.track=neutral.concat(st.track);
      st.kmZero=(st.kmZero||0)+nd[nd.length-1]+gap;
      save(); renderStage(true);
    }catch(err){ alert(err.message); }
  };
  rd.readAsText(f);
  e.target.value='';
});
el('btnAnalyze').onclick=analyzeRoute;
el('btnDraw').onclick=()=>setMode('draw');
el('btnUndoPt').onclick=()=>{ const st=cur.stage; if(st.track.length){ st.track.pop(); save(); renderStage(false);} };
el('btnClearRoute').onclick=()=>{ if(confirm('Hele route wissen? Waymarkers blijven staan (op km).')){ cur.stage.track=[]; cur.stage.kmZero=0; save(); renderStage(false);} };
el('btnAddWmMap').onclick=()=>setMode('wm-map');
el('btnAddWmKm').onclick=()=>{ if(!cur.stage.track.length){alert('Laad of teken eerst een route.');return;} wmModal(null, 0); };
el('stT0').addEventListener('change',()=>{ cur.stage.t0time=el('stT0').value; save(); renderStage(false); });
el('stSpeed').addEventListener('change',()=>{ cur.stage.avgSpeed=+el('stSpeed').value||null; save(); renderStage(false); });
el('btnWmImport').onclick=()=>{
  const opts=[];
  for(const r of state.races) for(const s of r.stages){
    if(s.id===cur.stage.id || !s.waymarkers.length) continue;
    opts.push({label:esc(r.name)+(r.stages.length>1?' · '+esc(s.name):'')+' ('+s.waymarkers.length+' ⚑)', race:r, stage:s});
  }
  if(!opts.length){ alert('Geen andere etappes met waymarkers gevonden.'); return; }
  modal(
    '<h2>Waymarkers kopiëren</h2>'+
    '<label>Bron-etappe</label><select id="impSrc">'+opts.map((o,i)=>'<option value="'+i+'">'+o.label+'</option>').join('')+'</select>'+
    '<p style="font-size:13px;color:var(--muted);margin-top:10px">Alle waymarkers van de bron worden toegevoegd aan deze etappe, op dezelfde kilometers. Controleer daarna of de km\'s kloppen als de parcoursen verschillen.</p>'+
    '<div class="btns"><button class="ghost" onclick="closeModal()">Annuleer</button><button class="primary" id="impGo">Kopieer</button></div>',
    m=>{
      m.querySelector('#impGo').onclick=()=>{
        const src=opts[+m.querySelector('#impSrc').value];
        for(const w of src.stage.waymarkers) cur.stage.waymarkers.push({...w, id:uid()});
        save(); closeModal(); renderStage(false);
      };
    });
};
el('btnExportGpx').onclick=()=>{ const st=cur.stage; if(!st.track.length){alert('Geen route om te exporteren.');return;} download(safeName(cur.race.name+'_'+st.name)+'.gpx', buildGpx(st), 'application/gpx+xml'); };
el('btnStagePrint').onclick=roadbook;
el('panelToggle').onclick=()=>el('sidePanel').classList.toggle('collapsed');
function safeName(s){ return s.replace(/[^\w\-]+/g,'_').slice(0,60); }

/* backup / restore */
el('btnExportAll').onclick=()=>download('racehub-backup-'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify(state), 'application/json');
el('btnImportAll').onclick=()=>{
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=()=>{
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const s=JSON.parse(rd.result);
        if(!s.races) throw new Error('bad');
        if(confirm('Huidige data vervangen door deze backup?')){ state=s; save(); showHub(); }
      }catch(e){ alert('Ongeldig backup-bestand.'); }
    };
    rd.readAsText(inp.files[0]);
  };
  inp.click();
};

window.addEventListener('resize', ()=>{
  if(cur.stage){ drawProfile(); if(map) map.invalidateSize(); }
  if(!el('liveView').classList.contains('hidden')){ drawLiveProfile(live.curM); if(liveMap) liveMap.invalidateSize(); }
});
window.showHub=showHub; window.closeModal=closeModal;

showHub();
</script>
